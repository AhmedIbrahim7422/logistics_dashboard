<!--
    NexusTrack - Live Map Component
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Map - NexusTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        darkTheme: '#111827', darkerTheme: '#030712', appBg: '#f3f4f6',
                        brandBlue: '#3b82f6', accentOrange: '#f97316', successGreen: '#10b981', dangerRed: '#ef4444'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-appBg text-gray-800 flex font-sans h-screen w-screen overflow-hidden">
    <aside id="sidebar" class="bg-darkerTheme text-gray-300 w-64 flex flex-col h-full transition-all duration-300 z-20 flex-shrink-0">
        <div class="h-16 flex items-center px-6 bg-darkTheme border-b border-gray-800">
            <div class="flex items-center gap-3 text-white font-bold text-xl tracking-wide">
                <i class="fa-solid fa-truck-fast text-brandBlue"></i>
                <span data-i18n="logo_text">NexusTrack</span>
            </div>
        </div>
        <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-2 relative">
            <p class="px-2 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2" data-i18n="menu_title">Menu</p>
            <a href="index.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 transition-all">
                <i class="fa-solid fa-chart-line w-5 text-center"></i>
                <span class="font-medium" data-i18n="dashboard">Dashboard</span>
            </a>
            <a href="live-map.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-brandBlue text-white shadow-md shadow-blue-500/20 group transition-all">
                <i class="fa-solid fa-map-location-dot w-5 text-center"></i>
                <span class="font-medium" data-i18n="live_map">Live Map</span>
            </a>
            <a href="fleet-status.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 transition-all">
                <i class="fa-solid fa-truck w-5 text-center"></i>
                <span class="font-medium" data-i18n="fleet_status">Fleet Status</span>
            </a>
            <a href="shipments.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 transition-all">
                <i class="fa-solid fa-boxes-stacked w-5 text-center"></i>
                <span class="font-medium" data-i18n="shipments">Shipments</span>
            </a>
            <a href="route-planning.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 transition-all">
                <i class="fa-solid fa-route w-5 text-center"></i>
                <span class="font-medium" data-i18n="route_planning">Route Planning</span>
            </a>
            <a href="alerts.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 transition-all justify-between">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-bell w-5 text-center"></i>
                    <span class="font-medium" data-i18n="alerts">Alerts</span>
                </div>
                <span class="bg-dangerRed text-white text-xs font-bold px-2 py-0.5 rounded-full">3</span>
            </a>
        </nav>
    </aside>
    <div class="flex-1 flex flex-col h-full min-w-0">
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 z-10 shrink-0">
            <div class="flex items-center flex-1 max-w-xl">
                 <input type="text" data-i18n="search_placeholder" placeholder="Search Tracking ID or Driver..." class="bg-gray-100 border-none text-sm rounded-full px-4 py-2 w-full focus:ring-2 focus:ring-brandBlue outline-none">
            </div>
            <div class="flex items-center gap-5 ml-4">
                <button id="langSwitcher" class="text-xs font-bold text-brandBlue hover:text-blue-700 bg-blue-50 px-2 py-1 rounded transition-colors uppercase">Arabic</button>
                <div class="w-px h-8 bg-gray-200"></div>
                <img src="https://i.pravatar.cc/150?img=47" alt="User Avatar" class="h-9 w-9 rounded-full object-cover border-2 border-gray-200">
            </div>
        </header>
        <main class="flex-1 relative flex flex-col md:flex-row overflow-hidden bg-gray-200">
            <div class="flex-1 bg-slate-300 relative overflow-hidden flex items-center justify-center">
                <div class="text-center z-10 p-8 bg-white/80 backdrop-blur rounded-2xl shadow-xl max-w-md">
                    <i class="fa-solid fa-map-marked-alt text-6xl text-brandBlue mb-4"></i>
                    <h2 class="text-2xl font-bold text-gray-800" data-i18n="map_overlay_title">Fleet Live Map Overlay</h2>
                    <p class="text-gray-600 mt-2" data-i18n="map_overlay_desc">Integrating Interactive GIS System... Real-time vehicle telemetry active.</p>
                </div>
            </div>
            <div class="w-full md:w-80 bg-white border-l border-gray-200 flex flex-col h-full z-10">
                <div class="p-4 border-b border-gray-100">
                    <h3 class="font-bold text-gray-800 flex items-center justify-between">
                        <span data-i18n="active_fleet">Active Fleet</span>
                        <span class="text-xs font-normal text-gray-500">184 <span data-i18n="vehicles_count">Vehicles</span></span>
                    </h3>
                </div>
                <div class="flex-1 overflow-y-auto p-4 space-y-3" id="liveMapFleetList">
                    <!-- Dynamic Fleet -->
                </div>
            </div>
        </main>
    </div>
    <script src="assets/js/translations.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/script.js"></script>
</body>
</html>
