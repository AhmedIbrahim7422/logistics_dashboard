<!--
    NexusTrack - Alerts & Notifications Component
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerts - NexusTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        darkTheme: '#111827', darkerTheme: '#030712', appBg: '#f3f4f6',
                        brandBlue: '#3b82f6', accentOrange: '#f97316', successGreen: '#10b981', dangerRed: '#ef4444'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-appBg text-gray-800 flex font-sans h-screen w-screen overflow-hidden">
    <aside id="sidebar" class="bg-darkerTheme text-gray-300 w-64 flex flex-col h-full transition-transform duration-300 z-50 fixed inset-y-0 ltr:left-0 rtl:right-0 transform -translate-x-full rtl:translate-x-full md:relative md:translate-x-0 rtl:md:translate-x-0 flex-shrink-0">
        <div class="h-16 flex items-center px-6 bg-darkTheme border-b border-gray-800">
            <div class="flex items-center gap-3 text-white font-bold text-xl tracking-wide">
                <i class="fa-solid fa-truck-fast text-brandBlue"></i>
                <span data-i18n="logo_text">NexusTrack</span>
            </div>
        </div>
        <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-2 relative">
            <p class="px-2 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2" data-i18n="menu_title">Menu</p>
            <a href="index.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 transition-all">
                <i class="fa-solid fa-chart-line w-5 text-center"></i>
                <span class="font-medium" data-i18n="dashboard">Dashboard</span>
            </a>
            <a href="live-map.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 transition-all">
                <i class="fa-solid fa-map-location-dot w-5 text-center"></i>
                <span class="font-medium" data-i18n="live_map">Live Map</span>
            </a>
            <a href="fleet-status.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 transition-all">
                <i class="fa-solid fa-truck w-5 text-center"></i>
                <span class="font-medium" data-i18n="fleet_status">Fleet Status</span>
            </a>
            <a href="shipments.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 transition-all">
                <i class="fa-solid fa-boxes-stacked w-5 text-center"></i>
                <span class="font-medium" data-i18n="shipments">Shipments</span>
            </a>
            <a href="route-planning.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 transition-all">
                <i class="fa-solid fa-route w-5 text-center"></i>
                <span class="font-medium" data-i18n="route_planning">Route Planning</span>
            </a>
            <a href="alerts.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-dangerRed text-white shadow-md shadow-red-500/20 group transition-all justify-between">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-bell w-5 text-center"></i>
                    <span class="font-medium" data-i18n="alerts">Alerts</span>
                </div>
                <span class="bg-white text-dangerRed text-xs font-bold px-2 py-0.5 rounded-full">3</span>
            </a>
        </nav>
    </aside>
    <div class="flex-1 flex flex-col h-full min-w-0">
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 sm:px-6 z-10 shrink-0">
            <div class="flex items-center">
                <button id="mobileMenuBtn" class="md:hidden mr-4 ltr:mr-4 rtl:ml-4 text-gray-500 hover:text-gray-700 cursor-pointer block"><i class="fa-solid fa-bars text-xl"></i></button>
                <h1 class="text-xl font-bold text-gray-800" data-i18n="sys_alerts_title">System Alerts & Notifications</h1>
            </div>
            <div class="flex items-center gap-2 sm:gap-4">
                <button id="langSwitcher" class="text-xs font-bold text-brandBlue hover:text-blue-700 bg-blue-50 px-2 py-1 rounded transition-colors uppercase">Arabic</button>
                <div class="w-px h-8 bg-gray-200"></div>
                <div class="h-9 w-9 rounded-full bg-gray-100 flex items-center justify-center text-gray-400">
                    <i class="fa-solid fa-bell"></i>
                </div>
            </div>
        </header>
        <main class="flex-1 overflow-auto p-4 sm:p-4 sm:p-6 scroll-smooth">
            <div class="space-y-4 max-w-4xl mx-auto" id="alertsListContainer">
                <!-- Dynamic Alerts Array Injection -->
            </div>
        </main>
    </div>
    <script src="assets/js/translations.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/script.js"></script>
</body>
</html>
